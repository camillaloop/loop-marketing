<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loop Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --sidebar-bg: #f7f7f5;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a18;
      --muted: #6b6b63;
      --accent: #8b4a4a;
      --sidebar-width: 220px;
    }

    html, body { height: 100%; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── App switcher ── */
    .app-switcher {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #fff; border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex; align-items: center; gap: 6px; padding: 0 20px;
      z-index: 300; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .app-switcher::-webkit-scrollbar { display: none; }
    .app-switcher a {
      font-size: 13px; font-weight: 700; color: #1a1a18;
      text-decoration: none; padding: 6px 16px; border-radius: 8px;
      white-space: nowrap; opacity: 0.35;
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    .app-switcher a:hover { opacity: 0.7; }
    .app-switcher a.app-active { opacity: 1; box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
    .app-switcher a.vs-il  { background: #e5ff00; }
    .app-switcher a.vs-vc  { background: #d0c4de; }
    .app-switcher a.vs-el  { background: #5be87a; }
    .app-switcher a.vs-ind { background: #e4ffc2; }
    .app-switcher a.vs-mkt { background: #e2baba; }
    .app-switcher a.vs-ai  { background: #c2e0ff; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 48px;
      left: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 0 24px;
      z-index: 200;
    }

    .logo {
      font-family: "DM Serif Display", serif;
      font-size: 17px;
      color: var(--accent);
      padding: 0 22px;
      margin-bottom: 32px;
      letter-spacing: -0.2px;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 0 10px;
    }

    .nav-link {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 6px;
      border-left: 2px solid transparent;
      transition: background 0.12s, color 0.12s;
      display: block;
      cursor: pointer;
    }

    .nav-link:hover {
      background: rgba(0,0,0,0.04);
      color: var(--text);
    }

    .nav-link.active {
      background: rgba(0,0,0,0.05);
      border-left-color: var(--accent);
      color: var(--text);
    }

    /* ── Content ── */
    .content {
      margin-left: var(--sidebar-width);
      padding-top: 48px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      position: sticky;
      top: 48px;
      z-index: 10;
    }

    .topbar-inner {
      height: 52px;
      max-width: 1300px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    main {
      max-width: 1300px;
      width: 100%;
      margin: 40px 0;
      padding: 0 40px;
      flex: 1;
    }

    /* ── KD / Performance cards ── */
    .kd-card {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .kd-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .kd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .kd-metric {
      background: #f7f7f5;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .kd-metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .kd-metric-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .kd-metric-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .kd-metric-green  { color: #3b6d11; }
    .kd-metric-yellow { color: #b07d00; }
    .kd-metric-red    { color: #a32d2d; }
    .kd-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--text);
    }
    .kd-input-row label { min-width: 200px; color: var(--muted); }
    .kd-input {
      width: 90px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      text-align: right;
    }
    .kd-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .kd-bar-label { min-width: 110px; color: var(--text); text-align: right; }
    .kd-bar-track {
      flex: 1;
      background: #efefed;
      border-radius: 3px;
      height: 16px;
      overflow: hidden;
    }
    .kd-bar-fill { height: 100%; background: #3b6d11; border-radius: 3px; transition: width 0.3s; }
    .kd-bar-count { min-width: 36px; color: var(--muted); }
    .kd-refresh-btn {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 10px;
      cursor: pointer;
    }
    .kd-refresh-btn:hover { background: rgba(0,0,0,0.04); }

    /* ── Overview: loop cards ── */
    .ov-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .ov-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .ov-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
    }
    .ov-color-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .ov-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .ov-metrics {
      padding: 4px 0 10px;
    }
    .ov-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 22px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      gap: 12px;
    }
    .ov-row:last-child { border-bottom: none; }
    .ov-row-label { color: var(--muted); flex-shrink: 0; }

    /* Right side: value + goal + dot — single line */
    .ov-row-right {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
    }
    .ov-row-actual {
      font-weight: 600;
      font-size: 13.5px;
      color: var(--text);
      white-space: nowrap;
    }
    .ov-row-actual.green { color: #1f7a3c; }
    .ov-row-actual.red   { color: #c0392b; }
    .ov-row-actual.muted { color: var(--muted); font-weight: 400; }
    .ov-row-goal-txt {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    /* Small status dot */
    .ov-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ov-dot.ok  { background: #1f7a3c; }
    .ov-dot.bad { background: #c0392b; }

    /* ── Attract page ── */
    .att-card-body {
      padding: 18px 22px 20px;
    }
    .att-email-goal {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .att-email-count {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .att-email-sub {
      font-size: 11px;
      color: var(--muted);
    }
    .att-apollo-row {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .att-ch-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 16px;
    }
    .att-ch-head {
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 11px;
      padding: 0 0 7px;
      border-bottom: 1px solid var(--border);
    }
    .att-ch-row td {
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .att-ch-row:last-child td { border-bottom: none; }
    .att-ch-name { width: 36%; }
    .att-ch-val  { text-align: right; color: var(--muted); width: 16%; }
    .conv-link   { color: var(--text); font-weight: 700; text-decoration: underline dotted; cursor: pointer; }
    .conv-link:hover { color: #1a7a3a; }

    /* Converted email popup */
    #conv-popup {
      display: none; position: fixed; z-index: 500;
      background: #fff; border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.13);
      padding: 16px 20px 12px; min-width: 260px; max-width: 380px;
      max-height: 50vh;
      flex-direction: column;
    }
    #conv-popup.visible { display: flex; }
    #conv-popup h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--text); flex-shrink: 0; padding-right: 20px; }
    #conv-popup ul { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; min-height: 0; }
    #conv-popup li { font-size: 12px; color: var(--muted); padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    #conv-popup li:last-child { border-bottom: none; }
    #conv-popup-close { position: absolute; top: 10px; right: 12px; cursor: pointer; font-size: 18px; line-height: 1; color: var(--muted); background: none; border: none; padding: 0; }

    /* ── IL new-subs hover tooltip ── */
    #il-subs-tooltip {
      display: none; position: fixed; z-index: 600;
      background: #fff; border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.13);
      padding: 12px 16px; min-width: 220px; max-width: 340px;
      max-height: 40vh; overflow-y: auto;
      pointer-events: none;
    }
    #il-subs-tooltip h4 { font-size: 12px; font-weight: 700; margin: 0 0 8px; color: var(--text); }
    #il-subs-tooltip ul { list-style: none; padding: 0; margin: 0; }
    #il-subs-tooltip li { font-size: 12px; color: var(--muted); padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    #il-subs-tooltip li:last-child { border-bottom: none; }
    .il-subs-num { cursor: default; text-decoration: underline dotted; }

    /* ── Agents page ── */
    .agents-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      max-width: 560px;
    }
    .agents-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .agents-head {
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      color: var(--muted);
      padding: 14px 22px 10px;
      border-bottom: 1px solid var(--border);
    }
    .agents-row td {
      padding: 12px 22px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .agents-row:last-child td { border-bottom: none; }
    .agents-name { width: 75%; }
    .agents-num  { text-align: right; color: var(--muted); font-weight: 600; }

    /* ── E-mail campaigns page ── */
    .emc-week-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--border);
      border-radius: 20px;
      padding: 2px 9px;
    }
    .emc-card-body {
      padding: 6px 22px 14px;
    }
    .emc-row {
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .emc-row:last-child { border-bottom: none; }
    .emc-row-main {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .emc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .emc-date {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .emc-row-stats {
      display: flex;
      gap: 14px;
    }
    .emc-stat {
      font-size: 12px;
      color: var(--text);
    }
    .emc-stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-right: 3px;
    }

    /* ── Historic data ── */
    .hist-section {
      margin-bottom: 44px;
    }
    .hist-loop-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .hist-loop-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .hist-badge-live, .hist-badge-sample {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
    }
    .hist-badge-live   { background: #d6f2e0; color: #1a6c30; }
    .hist-badge-sample { background: #f0f0ee; color: #888; }
    .hist-charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ── Kohort attribution ── */
    .coh-section-title {
      font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px;
    }
    .coh-section-sub {
      font-size: 13px; color: var(--muted); margin-bottom: 28px;
    }
    .coh-summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px;
    }
    .coh-summary-card {
      background: var(--sidebar-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
    }
    .coh-summary-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .coh-summary-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .coh-summary-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .coh-filter-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .coh-filter-label { font-size: 12px; color: var(--muted); }
    .coh-filter-btn {
      font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted);
      transition: background 0.12s, color 0.12s;
    }
    .coh-filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .coh-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
    .coh-table {
      width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px;
    }
    .coh-th {
      text-align: left; font-weight: 600; font-size: 10px; color: var(--muted);
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      background: var(--sidebar-bg); white-space: nowrap;
    }
    .coh-th.right { text-align: right; }
    .coh-td {
      padding: 9px 12px; border-bottom: 1px solid var(--border);
      color: var(--text); vertical-align: middle; white-space: nowrap;
    }
    .coh-td.right { text-align: right; }
    .coh-td.muted { color: var(--muted); }
    .coh-week-cell {
      font-weight: 600; font-size: 11px; color: var(--text);
    }
    .coh-channel-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 2px; margin-right: 5px;
      vertical-align: middle;
    }
    .coh-pending { color: #ccc; font-size: 14px; line-height: 1; }
    .coh-conv-count { font-weight: 600; color: var(--text); }
    .coh-conv-rate  { font-size: 10px; color: var(--muted); margin-left: 3px; }
    .coh-rev-amt    { font-size: 10px; color: #3b6d11; display: block; margin-top: 1px; }
    .coh-row-last td { border-bottom: 2px solid var(--border); }
    .coh-row-week-first td { padding-top: 13px; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .content { margin-left: 0; }
      .sidebar { transform: translateX(-100%); }
      main { padding: 0 16px; margin: 20px 0; }
      .topbar { padding: 0 16px; }
      .ov-grid { grid-template-columns: 1fr; }
      .hist-charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-switcher">
  <a class="vs-il" href="https://impactloop-swe-news.vercel.app">Impact Loop</a>
  <a class="vs-vc" href="https://impactloopvc-news.vercel.app">Impact Loop VC</a>
  <a class="vs-el" href="https://energyloop-news.vercel.app">Energy Loop</a>
  <a class="vs-ind" href="https://industrial-loop.vercel.app">Industrial Loop</a>
  <a class="vs-mkt app-active" href="#">Marketing</a>
  <a class="vs-ai" href="https://intervju-ai.vercel.app">AI writer</a>
</div>

<aside class="sidebar">
  <div class="logo">Marketing</div>
  <nav>
    <a class="nav-link active" onclick="switchTab('overview', this)">Overview</a>
    <a class="nav-link" onclick="switchTab('attract', this)">E-mail growth</a>
    <a class="nav-link" onclick="switchTab('kohort-attribution', this)">Kohort attribution</a>
    <a class="nav-link" onclick="switchTab('engage', this)">Engage</a>
    <a class="nav-link" onclick="switchTab('agents', this)">Agents</a>
    <a class="nav-link" onclick="switchTab('email-campaigns', this)">E-mail campaigns</a>
    <a class="nav-link" onclick="switchTab('linkedin-campaigns', this)">LinkedIn campaigns</a>
    <a class="nav-link" onclick="switchTab('create-campaign', this)">Create campaign</a>
    <a class="nav-link" onclick="switchTab('historic-data', this)">Historic data</a>
  </nav>
</aside>

<div class="content">
  <div class="topbar">
    <div class="topbar-inner">
      <span class="topbar-title" id="topbar-title">Overview</span>
    </div>
  </div>
  <main id="main-content">
    <div style="font-size:13px;color:var(--muted)">Loading…</div>
  </main>
</div>

<script>
  const TAB_TITLES = {
    "overview":        "Overview",
    "attract":         "E-mail growth",
    "engage":          "Engage",
    "agents":          "Agents",
    "email-campaigns":    "E-mail campaigns",
    "linkedin-campaigns": "LinkedIn campaigns",
    "create-campaign":    "Create campaign",
    "historic-data":      "Historic data",
    "kohort-attribution": "Kohort attribution",
  };

  function switchTab(tab, el) {
    document.querySelectorAll(".nav-link").forEach(a => a.classList.remove("active"));
    if (el) el.classList.add("active");
    const titleEl = document.getElementById("topbar-title");
    if (titleEl) titleEl.textContent = TAB_TITLES[tab] || tab;
    if (tab === "overview")        renderOverviewPage();
    if (tab === "attract")         renderAttractPage();
    if (tab === "engage")          renderEngagePage();
    if (tab === "agents")          renderAgentsPage();
    if (tab === "email-campaigns")    renderEmailCampaignsPage();
    if (tab === "linkedin-campaigns") renderLinkedInCampaignsPage();
    if (tab === "create-campaign")    renderCreateCampaignPage();
    if (tab === "historic-data")      renderHistoricData();
    if (tab === "kohort-attribution") renderKohortPage();
  }

  // ── Overview: four loops ──────────────────────────────────────────────────
  const LOOPS = [
    { id: "il",  label: "Impact Loop",     color: "#e5ff00" },
    { id: "vc",  label: "Impact Loop VC",  color: "#d0c4de" },
    { id: "el",  label: "Energy Loop",     color: "#5be87a" },
    { id: "ind", label: "Industrial Loop", color: "#e4ffc2" },
  ];

  const METRICS = [
    { key: "mrrGrowthWeek",  label: "MRR growth/week"  },
    { key: "mrrGrowthMonth", label: "MRR growth/month" },
    { key: "newSubs",       label: "New subscribers/week" },
    { key: "churnMax",      label: "Churn" },
    { key: "totalCac",      label: "Total CAC" },
    { key: "ltv",           label: "LTV" },
    { key: "ltvCac",        label: "LTV:CAC" },
    { key: "payback",       label: "Payback time" },
  ];

  let overviewWeek = getCurrentMonday();
  let subsCaches   = {};

  function getOverviewWeekOptions() {
    const options = [];
    let d = new Date(getCurrentMonday() + "T00:00:00Z");
    for (let i = 0; i < 5; i++) {
      options.push(d.toISOString().slice(0, 10));
      d.setUTCDate(d.getUTCDate() - 7);
    }
    return options;
  }

  function switchOverviewWeek(monday) {
    overviewWeek = monday;
    loadSubsData();

  function renderVcMetrics(d) {
    if (!d) return;
    const ACQ_COST      = 28230;
    const EUR_SEK       = d.eurSek            || 11;
    const currentMrr    = d.currentMrr        || 0;
    const weekStartMrr  = d.weekStartMrr      || 0;
    const monthStartMrr = d.monthStartMrr     || 0;
    const newSubsWeek   = d.newSubsThisWeek   ?? null;
    const newSubs30     = d.lastMonthNewSubs   || 0;
    const churnRate     = d.lastMonthChurnRate || 0;
    const avgMonthSek   = Math.round((d.avgMonthlyEur || 0) * EUR_SEK);

    const mrrGrowthWeek  = Math.round(currentMrr - weekStartMrr);
    const mrrGrowthMonth = Math.round(currentMrr - monthStartMrr);
    const cacVal    = newSubs30 > 0 ? Math.round(ACQ_COST / newSubs30) : 0;
    const ltv       = churnRate > 0 && avgMonthSek > 0
                        ? Math.round(avgMonthSek / (churnRate / 100)) : 0;
    const ltvCac    = cacVal > 0 && ltv > 0
                        ? Math.round((ltv / cacVal) * 10) / 10 : 0;
    const payback   = cacVal > 0 && avgMonthSek > 0
                        ? Math.round(cacVal / avgMonthSek) : 0;

    function cell(valueHtml, valueCls, goalText, isOk) {
      const valSpan  = `<span class="ov-row-actual ${valueCls || ""}">${valueHtml}</span>`;
      if (goalText == null) return valSpan;
      const goalSpan = `<span class="ov-row-goal-txt">/ ${goalText}</span>`;
      const dot      = isOk == null ? "" :
        `<span class="ov-dot ${isOk ? "ok" : "bad"}"></span>`;
      return valSpan + goalSpan + dot;
    }

    function set(key, innerHTML) {
      const el = document.getElementById(`ov-vc-${key}`);
      if (el) el.innerHTML = innerHTML;
    }

    const fmtKr = n => n > 0 ? n.toLocaleString("sv-SE") + " kr" : "–";

    const fmtGrowth = (n) => (n >= 0 ? "+" : "−") + Math.abs(n).toLocaleString("sv-SE") + " kr";

    set("mrrGrowthWeek",  cell(fmtGrowth(mrrGrowthWeek),
                               mrrGrowthWeek  >= 0 ? "green" : "red",
                               "2 000 kr", mrrGrowthWeek  >= 2000));
    set("mrrGrowthMonth", cell(fmtGrowth(mrrGrowthMonth),
                               mrrGrowthMonth >= 0 ? "green" : "red",
                               "8 000 kr", mrrGrowthMonth >= 8000));

    if (newSubsWeek !== null)
      set("newSubs", cell(String(newSubsWeek),
                          newSubsWeek >= 10 ? "green" : "red",
                          "10", newSubsWeek >= 10));

    const churnOk = churnRate > 0 && churnRate <= 10;
    set("churnMax", cell(churnRate > 0 ? churnRate + "%" : "–",
                         churnOk ? "green" : "red",
                         "≤ 10%", churnRate > 0 ? churnOk : null));
    set("totalCac", cell(fmtKr(cacVal), "", null, null));
    set("ltv",      cell(fmtKr(ltv), "", null, null));

    const ltvCls = ltvCac >= 5 ? "green" : ltvCac >= 3 ? "" : "red";
    set("ltvCac",  cell(ltvCac > 0 ? ltvCac + "×" : "–", ltvCls,
                        "3–5×", ltvCac > 0 ? ltvCac >= 3 : null));
    set("payback", cell(payback > 0 ? payback + " months" : "–",
                        payback > 0 && payback <= 3 ? "green" : payback > 3 ? "red" : "",
                        "< 3 months", payback > 0 ? payback <= 3 : null));
  }

    const WEEK_GOAL  = 2500;
    const MONTH_GOAL = 10000;

    // Day-of-week pace (Mon=1 … Sun=7)
    const jsDay  = new Date().getDay();
    const dayNum = jsDay === 0 ? 7 : jsDay;
    const weekActual   = Math.round(currentMrr - weekStartMrr);
    const weekExpected = Math.round((dayNum / 7) * WEEK_GOAL);
    const weekDelta    = weekActual - weekExpected;

    // Day-of-month pace
    const today       = new Date();
    const dayOfMonth  = today.getDate();
    const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
    const monthActual   = Math.round(currentMrr - monthStartMrr);
    const monthExpected = Math.round((dayOfMonth / daysInMonth) * MONTH_GOAL);
    const monthDelta    = monthActual - monthExpected;

    const fmtDelta = (n) => (n >= 0 ? "+" : "−") + Math.abs(n).toLocaleString("sv-SE") + " kr";

  // ── CAC Data ──────────────────────────────────────────────────────────────
  const EUR_SEK = 11;
  let cacDataCache = null;
  let cacState = { acqCost: 28230, newSubs: null, churnPct: null };

  async function loadCacData(force = false) {
    if (cacDataCache && !force) { applyCacData(cacDataCache); return; }
    const btn = document.getElementById("kd-refresh-btn");
    if (btn) btn.disabled = true;
    if (force) { cacState.newSubs = null; cacState.churnPct = null; }
    try {
      const r = await fetch("/api/cac-data");
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      cacDataCache = await r.json();
      applyCacData(cacDataCache);
    } catch (e) {
      const c = document.getElementById("kd-calc-card");
      if (c) c.insertAdjacentHTML("beforeend", `<p style="color:#b33;font-size:13px">Error: ${escHtml(e.message)}</p>`);
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  function applyCacData(data) {
    let monLabel = "";
    if (data.stripe) {
      const s = data.stripe;
      const lastMon = s.lastCompleteMonthKey || "";
      monLabel = lastMon
        ? new Date(lastMon + "-01").toLocaleString("en-GB", { month: "short", year: "numeric" })
        : "";
      cacState.newSubs  = s.lastMonthNewSubs;
      cacState.churnPct = s.lastMonthChurnRate;
      const elNew   = document.getElementById("kd-newsubs");
      const elChurn = document.getElementById("kd-churn");
      if (elNew)   elNew.value   = s.lastMonthNewSubs;
      if (elChurn) elChurn.value = s.lastMonthChurnRate;
      const srcEl1 = document.getElementById("kd-newsubs-src");
      const srcEl2 = document.getElementById("kd-churn-src");
      if (srcEl1) srcEl1.textContent = "(last 30 days)";
      if (srcEl2) srcEl2.textContent = "(last 30 days)";
      const meta = document.getElementById("kd-stripe-meta");
      if (meta) meta.textContent =
        `Stripe: ${s.activeCount} active · avg €${s.avgMonthlyEur}/mo · last 30d: ${s.lastMonthNewSubs} new, ${s.lastMonthChurnRate}% churn · 6-mo avg: ${s.avgNewPerMonth} new/mo`;
      renderNewSubsChart(s.newByMonth);
      renderChurnChart(s.churnByMonth);
    }
    const attrLabel = data.stripe?.attributionFromDate
      ? `${data.stripe.attributionFromDate} – today (30 days)`
      : monLabel;
    if (data.mailchimp) renderAttribution(data.mailchimp, attrLabel);
    if (data.stripe && data.mailchimp) renderCacChannels(data, attrLabel);
    if (data.errors?.length) console.warn("[cac-data] errors:", data.errors);
    updateCacCalc();
  }

  function updateCacCalc() {
    const acq     = parseFloat(document.getElementById("kd-acq")?.value)     || 28230;
    const newSubs = parseFloat(document.getElementById("kd-newsubs")?.value) || 0;
    const churnP  = parseFloat(document.getElementById("kd-churn")?.value)   || 0;
    if (!newSubs || !churnP) return;
    const totalCostSek = acq;
    const cac = Math.round(totalCostSek / newSubs);
    const avgPriceSek = cacDataCache?.stripe
      ? Math.round(cacDataCache.stripe.avgMonthlyEur * EUR_SEK)
      : 0;
    const ltv    = churnP > 0 && avgPriceSek > 0 ? Math.round(avgPriceSek / (churnP / 100)) : 0;
    const ltvCac = cac > 0 && ltv > 0 ? Math.round((ltv / cac) * 10) / 10 : 0;
    const payback = avgPriceSek > 0 ? Math.round(cac / avgPriceSek) : 0;
    const fmt = (n) => n > 0 ? n.toLocaleString("en-GB") : "–";
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
    set("kd-cac",     cac     > 0 ? fmt(cac)     + " kr" : "–");
    set("kd-ltv",     ltv     > 0 ? fmt(ltv)     + " kr" : "–");
    set("kd-payback", payback > 0 ? payback       + " months" : "–");
    const ltvEl = document.getElementById("kd-ltvcac");
    const subEl = document.getElementById("kd-ltvcac-sub");
    if (ltvEl) {
      ltvEl.textContent = ltvCac > 0 ? ltvCac + "×" : "–";
      ltvEl.className   = "kd-metric-value " + (ltvCac >= 5 ? "kd-metric-green" : ltvCac >= 3 ? "kd-metric-yellow" : ltvCac > 0 ? "kd-metric-red" : "");
    }
    if (subEl) subEl.textContent = ltvCac >= 5 ? "Excellent" : ltvCac >= 3 ? "Acceptable" : ltvCac > 0 ? "Below target" : "–";
  }

  function renderBarChart(elId, entries, color, extraLabelFn) {
    const el = document.getElementById(elId);
    if (!el) return;
    if (!entries.length) { el.innerHTML = `<p style="color:var(--muted);font-size:13px">No data.</p>`; return; }
    const vals   = entries.map(([, v]) => typeof v === "object" ? v.churned : v);
    const maxVal = Math.max(...vals, 1);
    const W = 420, H = extraLabelFn ? 150 : 130;
    const padL = 36, padR = 10, padT = 10, padB = extraLabelFn ? 42 : 28;
    const cW = W - padL - padR, cH = H - padT - padB;
    const barW = (cW / entries.length) * 0.55;
    const xAt  = (i) => padL + (i + 0.5) * (cW / entries.length);
    const yAt  = (v) => padT + cH - (v / maxVal) * cH;
    const yTicks = [0, Math.ceil(maxVal / 2), maxVal];
    const grid = yTicks.map(v => {
      const y = yAt(v);
      return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#ebebeb" stroke-width="1"/>` +
             `<text x="${padL - 4}" y="${y + 3.5}" text-anchor="end" font-size="9" fill="#ccc">${v}</text>`;
    }).join("");
    const bars = entries.map(([mon, raw], i) => {
      const val = typeof raw === "object" ? raw.churned : raw;
      const bH  = Math.max(2, (val / maxVal) * cH);
      const lbl = mon.slice(5);
      const extra = extraLabelFn ? extraLabelFn(raw, i) : "";
      return `<rect x="${xAt(i) - barW / 2}" y="${yAt(val)}" width="${barW}" height="${bH}" fill="${color}" rx="2"/>` +
             `<text x="${xAt(i)}" y="${H - (extraLabelFn ? 24 : 6)}" text-anchor="middle" font-size="9" fill="#999">${lbl}</text>` +
             `<text x="${xAt(i)}" y="${yAt(val) - 4}" text-anchor="middle" font-size="9" fill="#666">${val}</text>` +
             extra;
    }).join("");
    el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">${grid}${bars}</svg>`;
  }

  function renderNewSubsChartTo(elId, newByMonth, color = "#8b4a4a") {
    const entries = Object.entries(newByMonth).sort(([a], [b]) => a.localeCompare(b));
    renderBarChart(elId, entries, color, null);
  }

  function renderChurnChartTo(elId, churnByMonth, color = "#a32d2d") {
    const entries = Object.entries(churnByMonth).sort(([a], [b]) => a.localeCompare(b));
    const xAt = (i) => { const cW = 420 - 36 - 10; return 36 + (i + 0.5) * (cW / entries.length); };
    renderBarChart(elId, entries, color, (raw, i) => {
      const rate = typeof raw === "object" ? raw.churnRate : 0;
      return `<text x="${xAt(i)}" y="${150 - 10}" text-anchor="middle" font-size="9" fill="${color}">${rate}%</text>`;
    });
  }

  function renderCacChannels(data, monLabel) {
    const el  = document.getElementById("kd-cac-channels");
    const sub = document.getElementById("kd-cac-channels-subtitle");
    if (!el) return;
    const s  = data.stripe;
    const mc = data.mailchimp;
    const avgPriceSek = Math.round(s.avgMonthlyEur * EUR_SEK);
    const churnRate   = s.lastMonthChurnRate / 100;
    const ltv = churnRate > 0 && avgPriceSek > 0 ? Math.round(avgPriceSek / churnRate) : 0;
    const TOTAL_COST = 28230;
    const allChannels = [
      { label: "Apollo",         count: mc.apolloCount   || 0, color: "#3b6d11" },
      { label: "LinkedIn ads",   count: mc.linkedinCount || 0, color: "#0a66c2" },
      { label: "Popups/own ads", count: mc.popupsCount   || 0, color: "#7b3fa0" },
      { label: "Google ads",     count: mc.googleCount   || 0, color: "#e67e22" },
      { label: "Organic",        count: mc.organicCount  || 0, color: "#27ae60" },
      { label: "Unknown",        count: mc.unknownCount  || 0, color: "#95a5a6" },
    ];
    const totalConv   = allChannels.reduce((sum, c) => sum + c.count, 0);
    const overallCac  = totalConv > 0 ? Math.round(TOTAL_COST / totalConv) : 0;
    const ltvCacRatio = overallCac > 0 && ltv > 0 ? Math.round((ltv / overallCac) * 10) / 10 : 0;
    const cacColor    = ltvCacRatio >= 5 ? "#4a7c3f" : ltvCacRatio >= 3 ? "#d97706" : ltvCacRatio > 0 ? "#c0392b" : "#999";
    if (sub) sub.textContent =
      `Conversions per channel · ${monLabel || "last 30 days"} · Total cost: ${TOTAL_COST.toLocaleString("en-GB")} kr/month`;
    const maxCount = Math.max(...allChannels.map(c => c.count), 1);
    const W = 500, rowH = 34, padL = 155, padR = 60, padT = 44, padB = 20;
    const H = padT + allChannels.length * rowH + padB;
    const cW = W - padL - padR;
    const xAt = (v) => padL + (v / maxCount) * cW;
    const tickStep = maxCount <= 5 ? 1 : maxCount <= 20 ? 5 : 10;
    const ticks = [];
    for (let v = 0; v <= maxCount; v += tickStep) ticks.push(v);
    const grid = ticks.map(v => {
      const x = xAt(v);
      return `<line x1="${x}" y1="${padT}" x2="${x}" y2="${H - padB}" stroke="#ebebeb" stroke-width="1"/>` +
             `<text x="${x}" y="${H - 6}" text-anchor="middle" font-size="9" fill="#aaa">${v}</text>`;
    }).join("");
    const cacLabel = overallCac > 0 ? `${overallCac.toLocaleString("en-GB")} kr/subscriber` : "–";
    const ltvLabel = ltvCacRatio > 0 ? `  ·  LTV:CAC ${ltvCacRatio}×` : "";
    const headline = `<text x="${padL}" y="18" font-size="13" font-weight="600" fill="${cacColor}">CAC: ${cacLabel}${ltvLabel}</text>` +
                     `<text x="${padL}" y="32" font-size="10" fill="#aaa">${TOTAL_COST.toLocaleString("en-GB")} kr ÷ ${totalConv} conv.</text>`;
    const bars = allChannels.map((ch, i) => {
      const y = padT + i * rowH;
      const midY = y + rowH * 0.5;
      const bW   = ch.count > 0 ? Math.max(2, (ch.count / maxCount) * cW) : 0;
      const bH   = rowH * 0.52;
      const textColor = ch.count > 0 ? "#444" : "#bbb";
      const barEl = ch.count > 0
        ? `<rect x="${padL}" y="${midY - bH/2}" width="${bW}" height="${bH}" fill="${ch.color}" rx="2" opacity="0.85"/>` +
          `<text x="${padL + bW + 5}" y="${midY + 4}" font-size="10" fill="${ch.color}">${ch.count}</text>`
        : `<text x="${padL + 4}" y="${midY + 4}" font-size="10" fill="#ccc" font-style="italic">0 conv.</text>`;
      return `<text x="${padL - 8}" y="${midY + 4}" text-anchor="end" font-size="11" fill="${textColor}">${escHtml(ch.label)}</text>` + barEl;
    }).join("");
    el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">${headline}${grid}${bars}</svg>`;
  }

  const ATTRACT_FIRST_MONDAY = "2026-06-02"; // Monday of V.23 2026 — earliest tracked week

  function getCurrentMonday() {
    const now = new Date();
    const day = now.getUTCDay() || 7;
    const d   = new Date(now);
    d.setUTCDate(now.getUTCDate() - (day - 1));
    d.setUTCHours(0, 0, 0, 0);
    return d.toISOString().slice(0, 10);
  }

  function mondayToWeekLabel(mondayStr) {
    const d   = new Date(mondayStr + "T00:00:00Z");
    const day = d.getUTCDay() || 7;
    const thu = new Date(d);
    thu.setUTCDate(d.getUTCDate() + 4 - day);
    const yearStart = new Date(Date.UTC(thu.getUTCFullYear(), 0, 1));
    const week = Math.ceil(((thu - yearStart) / 86400000 + 1) / 7);
    return `V. ${week} ${thu.getUTCFullYear()}`;
  }

  function getAttractWeekOptions() {
    const current = getCurrentMonday();
    const first   = ATTRACT_FIRST_MONDAY;
    const options = [];
    let d = new Date(current + "T00:00:00Z");
    const stop = new Date(first + "T00:00:00Z");
    while (d >= stop) {
      options.push(d.toISOString().slice(0, 10));
      d.setUTCDate(d.getUTCDate() - 7);
    }
    return options; // newest first
  }

      renderAttractData(attractCaches[week]);

  // Returns ISO week number label, e.g. "v. 22"
  function currentWeekLabel() {
    const d = new Date();
    d.setUTCHours(0, 0, 0, 0);
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); // Thursday of current ISO week
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const week = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
    return `v. ${week}`;
  }

              style="padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;width:100%;background:#fff">
              <option value="alla">Alla</option>
              <option value="gratis">Gratis</option>
              <option value="betalande">Betalande</option>
            </select>
          </div>

          <!-- Byline -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:13px;font-weight:600;color:var(--text)">Byline (avsändare)</label>
            <select id="cc-editor"
              style="padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;width:100%;background:#fff">
              ${editorOptions}
            </select>
          </div>

          <div style="display:flex;gap:10px;margin-top:4px">
            <button onclick="ccSubmit()" id="cc-btn"
              style="padding:10px 22px;background:#e4ffc2;border:1px solid #bef08b;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
              ✓ Skapa Mailchimp-utkast
            </button>
          </div>

          <div id="cc-result" style="display:none"></div>

        </div>
      </div>`;
  }

  function ccOnLoopChange() {
    const idx = parseInt(document.getElementById("cc-loop")?.value || "0", 10);
    const loop = ccLoops[idx];
    // Visa/dölj segment-väljare
    const segWrap = document.getElementById("cc-segment-wrap");
    if (segWrap) segWrap.style.display = loop?.segment_gratis_id ? "flex" : "none";
  }

  function ccInsertBold() {
    const ta = document.getElementById("cc-intro");
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const val = ta.value;
    const selected = val.slice(start, end) || "fetstil";
    const insert = `**${selected}**`;
    ta.value = val.slice(0, start) + insert + val.slice(end);
    ta.focus();
    ta.setSelectionRange(start + 2, start + 2 + selected.length);
  }

  function ccInsertLink() {
    const ta = document.getElementById("cc-intro");
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const val = ta.value;
    const selected = val.slice(start, end);
    const url = prompt("Klistra in URL:");
    if (!url) return;
    const insert = `[${selected || "länktext"}](${url})`;
    ta.value = val.slice(0, start) + insert + val.slice(end);
    ta.focus();
    ta.setSelectionRange(start, start + insert.length);
  }

  async function ccSubmit() {
    const idx      = parseInt(document.getElementById("cc-loop")?.value || "0", 10);
    const loop     = ccLoops[idx];
    const subject  = document.getElementById("cc-subject").value.trim();
    const preheader= document.getElementById("cc-preheader").value.trim();
    const intro    = document.getElementById("cc-intro").value.trim();
    const editorIdx= parseInt(document.getElementById("cc-editor").value || "0", 10);
    const editor   = ccAllEditors[editorIdx];
    const segment  = document.getElementById("cc-segment")?.value || "alla";
    const btn      = document.getElementById("cc-btn");
    const result   = document.getElementById("cc-result");

    if (!subject || !intro) {
      result.style.display = "block";
      result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#fff0f0;border:1px solid #fca5a5;font-size:13px;color:#dc2626">Fyll i ämnesrad och introtext.</div>`;
      return;
    }

    btn.textContent = "Skapar utkast…";
    btn.disabled = true;
    result.style.display = "none";

    try {
      const res = await fetch("/api/campaign-mailchimp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          subject,
          previewText: preheader,
          intro,
          segment,
          loop: { name: loop.name, color: loop.color, logo_url: loop.logo_url, website_url: loop.website_url, from_name: loop.from_name, reply_to: loop.reply_to, mailchimp_list_id: loop.mailchimp_list_id, segment_gratis_id: loop.segment_gratis_id, segment_betalande_id: loop.segment_betalande_id, linkedin_url: loop.linkedin_url },
          editorName: editor?.name || "",
          editorEmail: editor?.email || "",
          editorImageUrl: editor?.image_url || "",
        }),
      });
      const data = await res.json();
      result.style.display = "block";
      if (data.editUrl) {
        result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#f0fff4;border:1px solid #86efac;font-size:13px;color:#16a34a">
          ✅ Utkastet är skapat! <a href="${data.editUrl}" target="_blank" rel="noreferrer" style="color:#2563eb;text-decoration:underline;margin-left:8px">Öppna i Mailchimp →</a>
        </div>`;
      } else {
        result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#fff0f0;border:1px solid #fca5a5;font-size:13px;color:#dc2626">❌ ${data.error || "Något gick fel"}</div>`;
      }
    } catch(e) {
      result.style.display = "block";
      result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#fff0f0;border:1px solid #fca5a5;font-size:13px;color:#dc2626">❌ Något gick fel – försök igen.</div>`;
    } finally {
      btn.textContent = "✓ Skapa Mailchimp-utkast";
      btn.disabled = false;
    }
  }

  // ── Kohort attribution ───────────────────────────────────────────────────────

  const KOHORT_LOOPS = [
    { id: "vc",  label: "Impact Loop VC",  color: "#d0c4de" },
    { id: "il",  label: "Impact Loop",     color: "#e5ff00" },
    { id: "el",  label: "Energy Loop",     color: "#5be87a" },
    { id: "ind", label: "Industrial Loop", color: "#e4ffc2" },
  ];

  let kohortCaches   = {};          // keyed by loop id
  let kohortChannel  = "all";       // "all" | "Apollo" | "LinkedIn" | "Organic"
  let kohortLoop     = "vc";        // active loop id

  function renderKohortPage() {
    const el = document.getElementById("main-content");
    if (!el) return;

    const loopOptions = KOHORT_LOOPS.map(l =>
      `<option value="${l.id}"${l.id === kohortLoop ? " selected" : ""}>${escHtml(l.label)}</option>`
    ).join("");

    const activeLoop = KOHORT_LOOPS.find(l => l.id === kohortLoop) || KOHORT_LOOPS[0];

    el.innerHTML = `
      <div style="padding:24px 0 8px">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:4px;flex-wrap:wrap">
          <div class="coh-section-title" style="margin-bottom:0">Kohort attribution</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="ov-color-dot" style="background:${activeLoop.color}"></span>
            <select id="coh-loop-select" onchange="switchKohortLoop(this.value)"
              style="padding:5px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;cursor:pointer">
              ${loopOptions}
            </select>
          </div>
        </div>
        <div class="coh-section-sub">Konverteringar per vecka och kanal sedan mars 2026</div>
        <div id="coh-body"><span style="font-size:13px;color:var(--muted)">Laddar…</span></div>
      </div>`;
    loadKohortData();
  }

  function switchKohortLoop(id) {
    kohortLoop    = id;
    kohortChannel = "all";
    // Update color dot
    const dot = document.querySelector("#coh-loop-select").previousElementSibling;
    const loop = KOHORT_LOOPS.find(l => l.id === id);
    if (dot && loop) dot.style.background = loop.color;
    const body = document.getElementById("coh-body");
    if (body) body.innerHTML = `<span style="font-size:13px;color:var(--muted)">Laddar…</span>`;
    loadKohortData();
  }

  async function loadKohortData(force = false) {
    if (kohortCaches[kohortLoop] && !force) { renderKohortBody(kohortCaches[kohortLoop]); return; }
    const body = document.getElementById("coh-body");
    if (body) body.innerHTML = `<span style="font-size:13px;color:var(--muted)">Laddar… (kan ta upp till 30 s)</span>`;
    try {
      const r = await fetch(`/api/cohort-${kohortLoop}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      kohortCaches[kohortLoop] = await r.json();
      renderKohortBody(kohortCaches[kohortLoop]);
    } catch(e) {
      const body = document.getElementById("coh-body");
      if (body) body.innerHTML = `<span style="color:#b33;font-size:13px">Fel: ${escHtml(e.message)}</span>`;
    }
  }

  function renderKohortBody(data) {
    const body = document.getElementById("coh-body");
    if (!body) return;
    const rows = data.rows || [];
    const ltv  = data.ltv  || 0;
    const WINDOWS = ["0–30d", "31–60d", "61–90d", "90d+"];
    const CH_COLOR = { Apollo: "#3b6d11", LinkedIn: "#0a66c2", Organic: "#888" };

    // Filter by selected channel
    const visible = kohortChannel === "all"
      ? rows
      : rows.filter(r => r.channel === kohortChannel);

    // Summary calculations
    const totalAcquired   = visible.reduce((s, r) => s + (r.acquired || 0), 0);
    let   totalConverted  = 0;
    let   totalRevenue    = 0;
    let   totalCost       = 0;
    for (const r of visible) {
      for (const w of WINDOWS) {
        if (r.cohorts[w] != null) totalConverted += r.cohorts[w];
        if (r.revenue[w] != null) totalRevenue   += r.revenue[w];
      }
      totalCost += r.cost || 0;
    }
    const cac        = totalConverted > 0 ? Math.round(totalCost / totalConverted) : 0;
    const ltvCacRatio = cac > 0 && ltv > 0 ? Math.round((ltv / cac) * 10) / 10 : 0;
    const fmtKr = n => n > 0 ? n.toLocaleString("sv-SE") + " kr" : "–";

    // Summary cards
    const summaryHtml = `
      <div class="coh-summary-grid">
        <div class="coh-summary-card">
          <div class="coh-summary-label">LTV (beräknat)</div>
          <div class="coh-summary-value">${fmtKr(ltv)}</div>
          <div class="coh-summary-sub">450 kr/mån ÷ 8.7% churn</div>
        </div>
        <div class="coh-summary-card">
          <div class="coh-summary-label">Totalt inhämtade</div>
          <div class="coh-summary-value">${totalAcquired.toLocaleString("sv-SE")}</div>
          <div class="coh-summary-sub">mailadresser sedan v.10</div>
        </div>
        <div class="coh-summary-card">
          <div class="coh-summary-label">Totalt konverterade</div>
          <div class="coh-summary-value">${totalConverted.toLocaleString("sv-SE")}</div>
          <div class="coh-summary-sub">betalande startups</div>
        </div>
        <div class="coh-summary-card">
          <div class="coh-summary-label">CAC (totalt)</div>
          <div class="coh-summary-value">${fmtKr(cac)}</div>
          <div class="coh-summary-sub">${ltvCacRatio > 0 ? "LTV:CAC " + ltvCacRatio + "×" : "–"}</div>
        </div>
      </div>`;

    // Channel filter
    const channels = ["all", "Apollo", "LinkedIn", "Organic"];
    const filterHtml = `
      <div class="coh-filter-row">
        <span class="coh-filter-label">Kanal:</span>
        ${channels.map(ch => `
          <button class="coh-filter-btn${kohortChannel === ch ? " active" : ""}"
            onclick="setKohortChannel('${ch}')">${ch === "all" ? "Alla" : escHtml(ch)}</button>`
        ).join("")}
        <button onclick="delete kohortCaches[kohortLoop]; loadKohortData()" style="margin-left:auto;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;padding:3px 10px;cursor:pointer">↻ Uppdatera</button>
      </div>`;

    // Group rows by week
    const weekOrder = [];
    const weekMap   = {};
    for (const r of visible) {
      if (!weekMap[r.week]) { weekMap[r.week] = []; weekOrder.push(r.week); }
      weekMap[r.week].push(r);
    }

    // Table
    const windowLabel = { "0–30d": "0–30 d", "31–60d": "31–60 d", "61–90d": "61–90 d", "90d+": "90d+" };
    const theadHtml = `
      <thead>
        <tr>
          <th class="coh-th" style="width:90px">Vecka</th>
          <th class="coh-th" style="width:95px">Kanal</th>
          <th class="coh-th right">Inhämtade</th>
          <th class="coh-th right">Kostnad</th>
          ${WINDOWS.map(w => `<th class="coh-th right">${windowLabel[w]}</th>`).join("")}
          <th class="coh-th right">Avg dagar</th>
        </tr>
      </thead>`;

    const tbodyRows = weekOrder.map(week => {
      const wRows = weekMap[week];
      return wRows.map((r, idx) => {
        const isFirst = idx === 0;
        const isLast  = idx === wRows.length - 1;
        const dot     = CH_COLOR[r.channel]
          ? `<span class="coh-channel-dot" style="background:${CH_COLOR[r.channel]}"></span>`
          : "";
        const costCell = r.cost > 0 ? r.cost.toLocaleString("sv-SE") + " kr" : "–";
        const windowCells = WINDOWS.map(w => {
          const count = r.cohorts[w];
          const rev   = r.revenue[w];
          if (count === null) return `<td class="coh-td right"><span class="coh-pending" title="Inte mätbar ännu">·</span></td>`;
          if (count === 0)    return `<td class="coh-td right muted">–</td>`;
          const rate  = r.acquired > 0 ? Math.round((count / r.acquired) * 100) : 0;
          const revStr = rev > 0 ? `<span class="coh-rev-amt">${rev.toLocaleString("sv-SE")} kr</span>` : "";
          return `<td class="coh-td right"><span class="coh-conv-count">${count}</span><span class="coh-conv-rate">(${rate}%)</span>${revStr}</td>`;
        }).join("");
        const avgCell = r.avgDaysToConvert != null
          ? `<td class="coh-td right muted">${r.avgDaysToConvert} d</td>`
          : `<td class="coh-td right muted">–</td>`;
        const rowCls = [
          isFirst ? "coh-row-week-first" : "",
          isLast  ? "coh-row-last"       : "",
        ].filter(Boolean).join(" ");
        return `
          <tr class="${rowCls}">
            <td class="coh-td coh-week-cell">${isFirst ? escHtml(week) : ""}</td>
            <td class="coh-td">${dot}${escHtml(r.channel)}</td>
            <td class="coh-td right">${r.acquired}</td>
            <td class="coh-td right muted">${costCell}</td>
            ${windowCells}
            ${avgCell}
          </tr>`;
      }).join("");
    }).join("");

    const tableHtml = visible.length === 0
      ? `<div style="font-size:13px;color:var(--muted);padding:24px 0">Inga rader för vald kanal.</div>`
      : `<div class="coh-table-wrap">
           <table class="coh-table">${theadHtml}<tbody>${tbodyRows}</tbody></table>
         </div>`;

    const legend = `
      <div style="font-size:11px;color:var(--muted);margin-top:12px">
        <strong>·</strong> = fönstret är inte mätbart ännu &nbsp;|&nbsp;
        Procent = andel av inhämtade i det fönstret &nbsp;|&nbsp;
        Grön = intäkt från Stripe
      </div>`;

    body.innerHTML = summaryHtml + filterHtml + tableHtml + legend;
  }

  function setKohortChannel(ch) {
    kohortChannel = ch;
    if (kohortCaches[kohortLoop]) renderKohortBody(kohortCaches[kohortLoop]);
  }

  // ── Converted email popup ──────────────────────────────────────────────────
  document.addEventListener("click", e => {
    const popup = document.getElementById("conv-popup");
    // Close button
    if (e.target.id === "conv-popup-close") {
      if (popup) popup.classList.remove("visible");
      return;
    }
    const link = e.target.closest(".conv-link");
    if (link) {
      e.preventDefault();
      const emails = (link.dataset.emails || "").split(",").filter(Boolean);
      document.getElementById("conv-popup-list").innerHTML =
        emails.map(em => `<li>${em}</li>`).join("");
      document.getElementById("conv-popup-count").textContent =
        `${emails.length} konverterad${emails.length !== 1 ? "e" : ""}`;
      // Show first so we can measure real height
      popup.classList.add("visible");
      const rect = link.getBoundingClientRect();
      const popW = popup.offsetWidth;
      const popH = popup.offsetHeight;
      // Prefer below, flip above if not enough room
      let top  = rect.bottom + 6;
      let left = rect.left;
      if (top + popH > window.innerHeight - 10) top = rect.top - popH - 6;
      if (top < 10) top = 10;
      if (left + popW > window.innerWidth - 10) left = window.innerWidth - popW - 10;
      if (left < 10) left = 10;
      popup.style.top  = top + "px";
      popup.style.left = left + "px";
      return;
    }
    if (popup && !popup.contains(e.target)) popup.classList.remove("visible");
  });

  // Boot
  renderOverviewPage();
</script>

<div id="conv-popup">
  <button id="conv-popup-close">&times;</button>
  <h4 id="conv-popup-count"></h4>
  <ul id="conv-popup-list"></ul>
</div>
<div id="il-subs-tooltip">
  <h4></h4>
  <ul></ul>
</div>
</body>
</html>
