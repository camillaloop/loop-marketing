<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loop Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --sidebar-bg: #f7f7f5;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a18;
      --muted: #6b6b63;
      --accent: #8b4a4a;
      --sidebar-width: 220px;
    }

    html, body { height: 100%; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── App switcher ── */
    .app-switcher {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #fff; border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex; align-items: center; gap: 6px; padding: 0 20px;
      z-index: 300; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .app-switcher::-webkit-scrollbar { display: none; }
    .app-switcher a {
      font-size: 13px; font-weight: 700; color: #1a1a18;
      text-decoration: none; padding: 6px 16px; border-radius: 8px;
      white-space: nowrap; opacity: 0.35;
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    .app-switcher a:hover { opacity: 0.7; }
    .app-switcher a.app-active { opacity: 1; box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
    .app-switcher a.vs-il  { background: #e5ff00; }
    .app-switcher a.vs-vc  { background: #d0c4de; }
    .app-switcher a.vs-el  { background: #5be87a; }
    .app-switcher a.vs-ind { background: #e4ffc2; }
    .app-switcher a.vs-mkt { background: #e2baba; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 48px;
      left: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 0 24px;
      z-index: 200;
    }

    .logo {
      font-family: "DM Serif Display", serif;
      font-size: 17px;
      color: var(--accent);
      padding: 0 22px;
      margin-bottom: 32px;
      letter-spacing: -0.2px;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 0 10px;
    }

    .nav-link {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 6px;
      border-left: 2px solid transparent;
      transition: background 0.12s, color 0.12s;
      display: block;
      cursor: pointer;
    }

    .nav-link:hover {
      background: rgba(0,0,0,0.04);
      color: var(--text);
    }

    .nav-link.active {
      background: rgba(0,0,0,0.05);
      border-left-color: var(--accent);
      color: var(--text);
    }

    /* ── Content ── */
    .content {
      margin-left: var(--sidebar-width);
      padding-top: 48px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      position: sticky;
      top: 48px;
      z-index: 10;
    }

    .topbar-inner {
      height: 52px;
      max-width: 1300px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    main {
      max-width: 1300px;
      width: 100%;
      margin: 40px 0;
      padding: 0 40px;
      flex: 1;
    }

    /* ── KD / Performance cards ── */
    .kd-card {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .kd-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .kd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .kd-metric {
      background: #f7f7f5;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .kd-metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .kd-metric-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .kd-metric-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .kd-metric-green  { color: #3b6d11; }
    .kd-metric-yellow { color: #b07d00; }
    .kd-metric-red    { color: #a32d2d; }
    .kd-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--text);
    }
    .kd-input-row label { min-width: 200px; color: var(--muted); }
    .kd-input {
      width: 90px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      text-align: right;
    }
    .kd-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .kd-bar-label { min-width: 110px; color: var(--text); text-align: right; }
    .kd-bar-track {
      flex: 1;
      background: #efefed;
      border-radius: 3px;
      height: 16px;
      overflow: hidden;
    }
    .kd-bar-fill { height: 100%; background: #3b6d11; border-radius: 3px; transition: width 0.3s; }
    .kd-bar-count { min-width: 36px; color: var(--muted); }
    .kd-refresh-btn {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 10px;
      cursor: pointer;
    }
    .kd-refresh-btn:hover { background: rgba(0,0,0,0.04); }

    /* ── Overview: loop cards ── */
    .ov-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .ov-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .ov-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
    }
    .ov-color-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .ov-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .ov-metrics {
      padding: 4px 0 10px;
    }
    .ov-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 22px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      gap: 12px;
    }
    .ov-row:last-child { border-bottom: none; }
    .ov-row-label { color: var(--muted); flex-shrink: 0; }

    /* Right side: value + goal + dot — single line */
    .ov-row-right {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
    }
    .ov-row-actual {
      font-weight: 600;
      font-size: 13.5px;
      color: var(--text);
      white-space: nowrap;
    }
    .ov-row-actual.green { color: #1f7a3c; }
    .ov-row-actual.red   { color: #c0392b; }
    .ov-row-actual.muted { color: var(--muted); font-weight: 400; }
    .ov-row-goal-txt {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    /* Small status dot */
    .ov-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ov-dot.ok  { background: #1f7a3c; }
    .ov-dot.bad { background: #c0392b; }

    /* ── Attract page ── */
    .att-card-body {
      padding: 18px 22px 20px;
    }
    .att-email-goal {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .att-email-count {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .att-email-sub {
      font-size: 11px;
      color: var(--muted);
    }
    .att-apollo-row {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .att-ch-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .att-ch-head {
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 11px;
      padding: 0 0 7px;
      border-bottom: 1px solid var(--border);
    }
    .att-ch-row td {
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .att-ch-row:last-child td { border-bottom: none; }
    .att-ch-name { width: 36%; }
    .att-ch-val  { text-align: right; color: var(--muted); width: 16%; }

    /* ── Agents page ── */
    .agents-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      max-width: 560px;
    }
    .agents-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .agents-head {
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      color: var(--muted);
      padding: 14px 22px 10px;
      border-bottom: 1px solid var(--border);
    }
    .agents-row td {
      padding: 12px 22px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .agents-row:last-child td { border-bottom: none; }
    .agents-name { width: 75%; }
    .agents-num  { text-align: right; color: var(--muted); font-weight: 600; }

    /* ── E-mail campaigns page ── */
    .emc-week-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--border);
      border-radius: 20px;
      padding: 2px 9px;
    }
    .emc-card-body {
      padding: 6px 22px 14px;
    }
    .emc-row {
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .emc-row:last-child { border-bottom: none; }
    .emc-row-main {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .emc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .emc-date {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .emc-row-stats {
      display: flex;
      gap: 14px;
    }
    .emc-stat {
      font-size: 12px;
      color: var(--text);
    }
    .emc-stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-right: 3px;
    }

    /* ── Historic data ── */
    .hist-section {
      margin-bottom: 44px;
    }
    .hist-loop-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .hist-loop-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .hist-badge-live, .hist-badge-sample {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
    }
    .hist-badge-live   { background: #d6f2e0; color: #1a6c30; }
    .hist-badge-sample { background: #f0f0ee; color: #888; }
    .hist-charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .content { margin-left: 0; }
      .sidebar { transform: translateX(-100%); }
      main { padding: 0 16px; margin: 20px 0; }
      .topbar { padding: 0 16px; }
      .ov-grid { grid-template-columns: 1fr; }
      .hist-charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-switcher">
  <a class="vs-il" href="https://impactloop-swe-news.vercel.app">Impact Loop</a>
  <a class="vs-vc" href="https://impactloopvc-news.vercel.app">Impact Loop VC</a>
  <a class="vs-el" href="https://energyloop-news.vercel.app">Energy Loop</a>
  <a class="vs-ind" href="https://industrial-loop.vercel.app">Industrial Loop</a>
  <a class="vs-mkt app-active" href="#">Marketing</a>
</div>

<aside class="sidebar">
  <div class="logo">Marketing</div>
  <nav>
    <a class="nav-link active" onclick="switchTab('overview', this)">Overview</a>
    <a class="nav-link" onclick="switchTab('attract', this)">Attract</a>
    <a class="nav-link" onclick="switchTab('engage', this)">Engage</a>
    <a class="nav-link" onclick="switchTab('agents', this)">Agents</a>
    <a class="nav-link" onclick="switchTab('email-campaigns', this)">E-mail campaigns</a>
    <a class="nav-link" onclick="switchTab('linkedin-campaigns', this)">LinkedIn campaigns</a>
    <a class="nav-link" onclick="switchTab('create-campaign', this)">Create campaign</a>
    <a class="nav-link" onclick="switchTab('editors', this)">Editors</a>
    <a class="nav-link" onclick="switchTab('historic-data', this)">Historic data</a>
  </nav>
</aside>

<div class="content">
  <div class="topbar">
    <div class="topbar-inner">
      <span class="topbar-title" id="topbar-title">Overview</span>
    </div>
  </div>
  <main id="main-content">
    <div style="font-size:13px;color:var(--muted)">Loading…</div>
  </main>
</div>

<script>
  const TAB_TITLES = {
    "overview":        "Overview",
    "attract":         "Attract",
    "engage":          "Engage",
    "agents":          "Agents",
    "email-campaigns":    "E-mail campaigns",
    "linkedin-campaigns": "LinkedIn campaigns",
    "create-campaign":    "Create campaign",
    "editors":            "Editors",
    "historic-data":      "Historic data",
  };

  function switchTab(tab, el) {
    document.querySelectorAll(".nav-link").forEach(a => a.classList.remove("active"));
    if (el) el.classList.add("active");
    const titleEl = document.getElementById("topbar-title");
    if (titleEl) titleEl.textContent = TAB_TITLES[tab] || tab;
    if (tab === "overview")        renderOverviewPage();
    if (tab === "attract")         renderAttractPage();
    if (tab === "engage")          renderEngagePage();
    if (tab === "agents")          renderAgentsPage();
    if (tab === "email-campaigns")    renderEmailCampaignsPage();
    if (tab === "linkedin-campaigns") renderLinkedInCampaignsPage();
    if (tab === "create-campaign")    renderCreateCampaignPage();
    if (tab === "editors")            renderEditorsPage();
    if (tab === "historic-data")      renderHistoricData();
  }

  // ── Overview: four loops ──────────────────────────────────────────────────
  const LOOPS = [
    { id: "il",  label: "Impact Loop",     color: "#e5ff00" },
    { id: "vc",  label: "Impact Loop VC",  color: "#d0c4de" },
    { id: "el",  label: "Energy Loop",     color: "#5be87a" },
    { id: "ind", label: "Industrial Loop", color: "#e4ffc2" },
  ];

  const METRICS = [
    { key: "mrrGrowthWeek",  label: "MRR growth/week"  },
    { key: "mrrGrowthMonth", label: "MRR growth/month" },
    { key: "newSubs",       label: "New subscribers/week" },
    { key: "churnMax",      label: "Churn" },
    { key: "totalCac",      label: "Total CAC" },
    { key: "ltv",           label: "LTV" },
    { key: "ltvCac",        label: "LTV:CAC" },
    { key: "payback",       label: "Payback time" },
  ];

  function renderOverviewPage() {
    const el = document.getElementById("main-content");
    const cards = LOOPS.map(loop => `
      <div class="ov-card">
        <div class="ov-card-header">
          <div class="ov-color-dot" style="background:${loop.color}"></div>
          <div class="ov-card-title">${loop.label}</div>
          ${loop.id === "vc" ? `<button onclick="loadVcData(true)" style="margin-left:auto;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;padding:2px 8px;cursor:pointer" id="ov-vc-refresh">Refresh</button>` : ""}
        </div>
        <div class="ov-metrics">
          ${METRICS.map(m => `
            <div class="ov-row">
              <span class="ov-row-label">${m.label}</span>
              <span class="ov-row-right" id="ov-${loop.id}-${m.key}"><span class="ov-row-actual muted">–</span></span>
            </div>`).join("")}
        </div>
      </div>`).join("");

    el.innerHTML = `
      <div style="padding:24px 0 8px">
        <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px">Overview</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Key metrics across all four loops</div>
        <div class="ov-grid">${cards}</div>
      </div>`;

    loadVcData();
    loadIlData();
  }

  let vcDataCache = null;

  async function loadVcData(force = false) {
    if (vcDataCache && !force) { renderVcMetrics(vcDataCache); return; }

    // Mark all VC cells as loading
    METRICS.forEach(m => {
      const el = document.getElementById(`ov-vc-${m.key}`);
      if (el) el.innerHTML = `<span class="ov-row-actual muted">…</span>`;
    });

    try {
      const r = await fetch("https://impactloopvc-news.vercel.app/api/mrr");
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      vcDataCache = await r.json();
      renderVcMetrics(vcDataCache);
    } catch (e) {
      METRICS.forEach(m => {
        const el = document.getElementById(`ov-vc-${m.key}`);
        if (el) el.innerHTML = `<span class="ov-row-actual red">Error</span>`;
      });
      console.error("[vc mrr]", e);
    }
  }

  function renderVcMetrics(d) {
    if (!d) return;
    const ACQ_COST      = 28230;
    const EUR_SEK       = d.eurSek            || 11;
    const currentMrr    = d.currentMrr        || 0;
    const weekStartMrr  = d.weekStartMrr      || 0;
    const monthStartMrr = d.monthStartMrr     || 0;
    const newSubsWeek   = d.newSubsThisWeek   ?? null;
    const newSubs30     = d.lastMonthNewSubs   || 0;
    const churnRate     = d.lastMonthChurnRate || 0;
    const avgMonthSek   = Math.round((d.avgMonthlyEur || 0) * EUR_SEK);

    const mrrGrowthWeek  = Math.round(currentMrr - weekStartMrr);
    const mrrGrowthMonth = Math.round(currentMrr - monthStartMrr);
    const cacVal    = newSubs30 > 0 ? Math.round(ACQ_COST / newSubs30) : 0;
    const ltv       = churnRate > 0 && avgMonthSek > 0
                        ? Math.round(avgMonthSek / (churnRate / 100)) : 0;
    const ltvCac    = cacVal > 0 && ltv > 0
                        ? Math.round((ltv / cacVal) * 10) / 10 : 0;
    const payback   = cacVal > 0 && avgMonthSek > 0
                        ? Math.round(cacVal / avgMonthSek) : 0;

    function cell(valueHtml, valueCls, goalText, isOk) {
      const valSpan  = `<span class="ov-row-actual ${valueCls || ""}">${valueHtml}</span>`;
      if (goalText == null) return valSpan;
      const goalSpan = `<span class="ov-row-goal-txt">/ ${goalText}</span>`;
      const dot      = isOk == null ? "" :
        `<span class="ov-dot ${isOk ? "ok" : "bad"}"></span>`;
      return valSpan + goalSpan + dot;
    }

    function set(key, innerHTML) {
      const el = document.getElementById(`ov-vc-${key}`);
      if (el) el.innerHTML = innerHTML;
    }

    const fmtKr = n => n > 0 ? n.toLocaleString("sv-SE") + " kr" : "–";

    const fmtGrowth = (n) => (n >= 0 ? "+" : "−") + Math.abs(n).toLocaleString("sv-SE") + " kr";

    set("mrrGrowthWeek",  cell(fmtGrowth(mrrGrowthWeek),
                               mrrGrowthWeek  >= 0 ? "green" : "red",
                               "2 000 kr", mrrGrowthWeek  >= 2000));
    set("mrrGrowthMonth", cell(fmtGrowth(mrrGrowthMonth),
                               mrrGrowthMonth >= 0 ? "green" : "red",
                               "8 000 kr", mrrGrowthMonth >= 8000));

    if (newSubsWeek !== null)
      set("newSubs", cell(String(newSubsWeek),
                          newSubsWeek >= 10 ? "green" : "red",
                          "10", newSubsWeek >= 10));

    const churnOk = churnRate > 0 && churnRate <= 10;
    set("churnMax", cell(churnRate > 0 ? churnRate + "%" : "–",
                         churnOk ? "green" : "red",
                         "≤ 10%", churnRate > 0 ? churnOk : null));
    set("totalCac", cell(fmtKr(cacVal), "", null, null));
    set("ltv",      cell(fmtKr(ltv), "", null, null));

    const ltvCls = ltvCac >= 5 ? "green" : ltvCac >= 3 ? "" : "red";
    set("ltvCac",  cell(ltvCac > 0 ? ltvCac + "×" : "–", ltvCls,
                        "3–5×", ltvCac > 0 ? ltvCac >= 3 : null));
    set("payback", cell(payback > 0 ? payback + " months" : "–",
                        payback > 0 && payback <= 3 ? "green" : payback > 3 ? "red" : "",
                        "< 3 months", payback > 0 ? payback <= 3 : null));
  }

  // ── Impact Loop Sverige (Google Sheets MRR) ──────────────────────────────
  let ilDataCache = null;

  async function loadIlData(force = false) {
    if (ilDataCache && !force) { renderIlMetrics(ilDataCache); return; }
    try {

      if (!r.ok) throw new Error(`HTTP ${r.status}`);

      ["mrrGrowthWeek", "mrrGrowthMonth"].forEach(key => {
        const el = document.getElementById(`ov-il-${key}`);

  function renderIlMetrics(d) {
    if (!d) return;
    const currentMrr    = d.currentMrr    || 0;
    const weekStartMrr  = d.mondayMrr     || 0;   // IL API uses mondayMrr
    const monthStartMrr = d.monthStartMrr || 0;

    const mrrGrowthWeek  = Math.round(currentMrr - weekStartMrr);
    const mrrGrowthMonth = Math.round(currentMrr - monthStartMrr);

    const fmtGrowth = (n) => (n >= 0 ? "+" : "−") + Math.abs(n).toLocaleString("sv-SE") + " kr";

    function setIl(key, innerHTML) {
      const el = document.getElementById(`ov-il-${key}`);
      if (el) el.innerHTML = innerHTML;
    }
    function cell(valueHtml, valueCls, goalText, isOk) {
      const valSpan  = `<span class="ov-row-actual ${valueCls || ""}">${valueHtml}</span>`;
      if (goalText == null) return valSpan;
      const goalSpan = `<span class="ov-row-goal-txt">/ ${goalText}</span>`;
      const dot      = isOk == null ? "" :
        `<span class="ov-dot ${isOk ? "ok" : "bad"}"></span>`;
      return valSpan + goalSpan + dot;
    }

    setIl("mrrGrowthWeek",  cell(fmtGrowth(mrrGrowthWeek),
                                 mrrGrowthWeek  >= 0 ? "green" : "red",
                                 "2 500 kr", mrrGrowthWeek  >= 2500));
    setIl("mrrGrowthMonth", cell(fmtGrowth(mrrGrowthMonth),
                                 mrrGrowthMonth >= 0 ? "green" : "red",
                                 "10 000 kr", mrrGrowthMonth >= 10000));
  }

        ? new Date(lastMon + "-01").toLocaleString("en-GB", { month: "short", year: "numeric" })

    const attrLabel = data.stripe?.attributionFromDate
      ? `${data.stripe.attributionFromDate} – today (30 days)`

  function updateCacCalc() {
    const acq     = parseFloat(document.getElementById("kd-acq")?.value)     || 28230;
    const newSubs = parseFloat(document.getElementById("kd-newsubs")?.value) || 0;
    const churnP  = parseFloat(document.getElementById("kd-churn")?.value)   || 0;
    if (!newSubs || !churnP) return;
    const totalCostSek = acq;
    const cac = Math.round(totalCostSek / newSubs);
    const avgPriceSek = cacDataCache?.stripe
      ? Math.round(cacDataCache.stripe.avgMonthlyEur * EUR_SEK)
      : 0;
    const ltv    = churnP > 0 && avgPriceSek > 0 ? Math.round(avgPriceSek / (churnP / 100)) : 0;
    const ltvCac = cac > 0 && ltv > 0 ? Math.round((ltv / cac) * 10) / 10 : 0;
    const payback = avgPriceSek > 0 ? Math.round(cac / avgPriceSek) : 0;
    const fmt = (n) => n > 0 ? n.toLocaleString("en-GB") : "–";
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
    set("kd-cac",     cac     > 0 ? fmt(cac)     + " kr" : "–");
    set("kd-ltv",     ltv     > 0 ? fmt(ltv)     + " kr" : "–");
    set("kd-payback", payback > 0 ? payback       + " months" : "–");
    const ltvEl = document.getElementById("kd-ltvcac");
    const subEl = document.getElementById("kd-ltvcac-sub");
    if (ltvEl) {
      ltvEl.textContent = ltvCac > 0 ? ltvCac + "×" : "–";
      ltvEl.className   = "kd-metric-value " + (ltvCac >= 5 ? "kd-metric-green" : ltvCac >= 3 ? "kd-metric-yellow" : ltvCac > 0 ? "kd-metric-red" : "");
    }
    if (subEl) subEl.textContent = ltvCac >= 5 ? "Excellent" : ltvCac >= 3 ? "Acceptable" : ltvCac > 0 ? "Below target" : "–";
  }

  function renderBarChart(elId, entries, color, extraLabelFn) {
    const el = document.getElementById(elId);
    if (!el) return;
    if (!entries.length) { el.innerHTML = `<p style="color:var(--muted);font-size:13px">No data.</p>`; return; }
    const vals   = entries.map(([, v]) => typeof v === "object" ? v.churned : v);
    const maxVal = Math.max(...vals, 1);
    const W = 420, H = extraLabelFn ? 150 : 130;
    const padL = 36, padR = 10, padT = 10, padB = extraLabelFn ? 42 : 28;
    const cW = W - padL - padR, cH = H - padT - padB;
    const barW = (cW / entries.length) * 0.55;
    const xAt  = (i) => padL + (i + 0.5) * (cW / entries.length);
    const yAt  = (v) => padT + cH - (v / maxVal) * cH;
    const yTicks = [0, Math.ceil(maxVal / 2), maxVal];
    const grid = yTicks.map(v => {
      const y = yAt(v);
      return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#ebebeb" stroke-width="1"/>` +
             `<text x="${padL - 4}" y="${y + 3.5}" text-anchor="end" font-size="9" fill="#ccc">${v}</text>`;
    }).join("");
    const bars = entries.map(([mon, raw], i) => {
      const val = typeof raw === "object" ? raw.churned : raw;
      const bH  = Math.max(2, (val / maxVal) * cH);
      const lbl = mon.slice(5);
      const extra = extraLabelFn ? extraLabelFn(raw, i) : "";
      return `<rect x="${xAt(i) - barW / 2}" y="${yAt(val)}" width="${barW}" height="${bH}" fill="${color}" rx="2"/>` +
             `<text x="${xAt(i)}" y="${H - (extraLabelFn ? 24 : 6)}" text-anchor="middle" font-size="9" fill="#999">${lbl}</text>` +
             `<text x="${xAt(i)}" y="${yAt(val) - 4}" text-anchor="middle" font-size="9" fill="#666">${val}</text>` +
             extra;
    }).join("");
    el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">${grid}${bars}</svg>`;
  }

  function renderNewSubsChartTo(elId, newByMonth, color = "#8b4a4a") {

  function renderChurnChartTo(elId, churnByMonth, color = "#a32d2d") {
    const entries = Object.entries(churnByMonth).sort(([a], [b]) => a.localeCompare(b));
    const xAt = (i) => { const cW = 420 - 36 - 10; return 36 + (i + 0.5) * (cW / entries.length); };
    renderBarChart(elId, entries, color, (raw, i) => {
      const rate = typeof raw === "object" ? raw.churnRate : 0;
      return `<text x="${xAt(i)}" y="${150 - 10}" text-anchor="middle" font-size="9" fill="${color}">${rate}%</text>`;
    });

  function renderCacChannels(data, monLabel) {
    const el  = document.getElementById("kd-cac-channels");
    const sub = document.getElementById("kd-cac-channels-subtitle");
    if (!el) return;
    const s  = data.stripe;
    const mc = data.mailchimp;
    const avgPriceSek = Math.round(s.avgMonthlyEur * EUR_SEK);
    const churnRate   = s.lastMonthChurnRate / 100;
    const ltv = churnRate > 0 && avgPriceSek > 0 ? Math.round(avgPriceSek / churnRate) : 0;
    const TOTAL_COST = 28230;
    const allChannels = [
      { label: "Apollo",         count: mc.apolloCount   || 0, color: "#3b6d11" },
      { label: "LinkedIn ads",   count: mc.linkedinCount || 0, color: "#0a66c2" },
      { label: "Popups/own ads", count: mc.popupsCount   || 0, color: "#7b3fa0" },
      { label: "Google ads",     count: mc.googleCount   || 0, color: "#e67e22" },
      { label: "Organic",        count: mc.organicCount  || 0, color: "#27ae60" },
      { label: "Unknown",        count: mc.unknownCount  || 0, color: "#95a5a6" },
    ];
    const totalConv   = allChannels.reduce((sum, c) => sum + c.count, 0);
    const overallCac  = totalConv > 0 ? Math.round(TOTAL_COST / totalConv) : 0;
    const ltvCacRatio = overallCac > 0 && ltv > 0 ? Math.round((ltv / overallCac) * 10) / 10 : 0;
    const cacColor    = ltvCacRatio >= 5 ? "#4a7c3f" : ltvCacRatio >= 3 ? "#d97706" : ltvCacRatio > 0 ? "#c0392b" : "#999";
    if (sub) sub.textContent =
      `Conversions per channel · ${monLabel || "last 30 days"} · Total cost: ${TOTAL_COST.toLocaleString("en-GB")} kr/month`;
    const maxCount = Math.max(...allChannels.map(c => c.count), 1);
    const W = 500, rowH = 34, padL = 155, padR = 60, padT = 44, padB = 20;
    const H = padT + allChannels.length * rowH + padB;
    const cW = W - padL - padR;
    const xAt = (v) => padL + (v / maxCount) * cW;
    const tickStep = maxCount <= 5 ? 1 : maxCount <= 20 ? 5 : 10;
    const ticks = [];
    for (let v = 0; v <= maxCount; v += tickStep) ticks.push(v);
    const grid = ticks.map(v => {
      const x = xAt(v);
      return `<line x1="${x}" y1="${padT}" x2="${x}" y2="${H - padB}" stroke="#ebebeb" stroke-width="1"/>` +
             `<text x="${x}" y="${H - 6}" text-anchor="middle" font-size="9" fill="#aaa">${v}</text>`;
    }).join("");
    const cacLabel = overallCac > 0 ? `${overallCac.toLocaleString("en-GB")} kr/subscriber` : "–";
    const ltvLabel = ltvCacRatio > 0 ? `  ·  LTV:CAC ${ltvCacRatio}×` : "";
    const headline = `<text x="${padL}" y="18" font-size="13" font-weight="600" fill="${cacColor}">CAC: ${cacLabel}${ltvLabel}</text>` +
                     `<text x="${padL}" y="32" font-size="10" fill="#aaa">${TOTAL_COST.toLocaleString("en-GB")} kr ÷ ${totalConv} conv.</text>`;
    const bars = allChannels.map((ch, i) => {
      const y = padT + i * rowH;
      const midY = y + rowH * 0.5;
      const bW   = ch.count > 0 ? Math.max(2, (ch.count / maxCount) * cW) : 0;
      const bH   = rowH * 0.52;
      const textColor = ch.count > 0 ? "#444" : "#bbb";
      const barEl = ch.count > 0
        ? `<rect x="${padL}" y="${midY - bH/2}" width="${bW}" height="${bH}" fill="${ch.color}" rx="2" opacity="0.85"/>` +
          `<text x="${padL + bW + 5}" y="${midY + 4}" font-size="10" fill="${ch.color}">${ch.count}</text>`
        : `<text x="${padL + 4}" y="${midY + 4}" font-size="10" fill="#ccc" font-style="italic">0 conv.</text>`;
      return `<text x="${padL - 8}" y="${midY + 4}" text-anchor="end" font-size="11" fill="${textColor}">${escHtml(ch.label)}</text>` + barEl;
    }).join("");
    el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">${headline}${grid}${bars}</svg>`;
  }

    try {
      const r = await fetch("/api/attract");
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      attractCache = await r.json();
      renderAttractData(attractCache);

      console.error("[attract]", e);

    const week = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
    return `v. ${week}`;
  }

  async function ccCreateLoop() {
    const body = {
      name: document.getElementById("clf-name").value.trim(),
      color: document.getElementById("clf-color").value.trim(),
      from_name: document.getElementById("clf-from-name").value.trim(),
      reply_to: document.getElementById("clf-reply-to").value.trim(),
      mailchimp_list_id: document.getElementById("clf-list-id").value.trim(),
      website_url: document.getElementById("clf-website").value.trim(),
      logo_url: document.getElementById("clf-logo").value.trim(),
    };
    if (!body.name) return alert("Namn krävs");
    await fetch("/api/loops", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    ccLoops = [];
    renderCreateCampaignPage();
  }

  async function ccSaveLoop(id) {
    const body = {
      name: document.getElementById("clf-name").value.trim(),
      color: document.getElementById("clf-color").value.trim(),
      from_name: document.getElementById("clf-from-name").value.trim(),
      reply_to: document.getElementById("clf-reply-to").value.trim(),
      mailchimp_list_id: document.getElementById("clf-list-id").value.trim(),
      website_url: document.getElementById("clf-website").value.trim(),
      logo_url: document.getElementById("clf-logo").value.trim(),
    };
    await fetch(`/api/loops?id=${id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    ccLoops = [];
    renderCreateCampaignPage();
  }

  async function ccDeleteLoop(id) {
    if (!confirm("Radera denna loop och alla dess redaktörer?")) return;
    await fetch(`/api/loops?id=${id}`, { method: "DELETE" });
    ccLoops = [];
    renderCreateCampaignPage();
  }

  async function ccLinkEditor(loopId) {
    const editorId = document.getElementById("cef-editor-select")?.value;
    if (!editorId) return alert("Välj en redaktör");
    await fetch("/api/editors?action=link", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ loop_id: loopId, editor_id: editorId }),
    });
    ccLoops = [];
    renderCreateCampaignPage();
    setTimeout(() => ccShowEditLoop(loopId), 300);
  }

  async function ccUnlinkEditor(linkId, loopId) {
    if (!confirm("Ta bort redaktören från denna loop?")) return;
    await fetch(`/api/editors?action=unlink&id=${linkId}`, { method: "DELETE" });
    ccLoops = [];
    renderCreateCampaignPage();
    setTimeout(() => ccShowEditLoop(loopId), 300);
  }

  async function ccCreateNewEditor() {

    const image = document.getElementById("cef-new-image")?.value.trim();
    if (!name) return alert("Namn krävs");
    await fetch("/api/editors", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, image_url: image }),
    });
    // Uppdatera alla-redaktörer-listan i dropdownen
    const allEditors = await fetch("/api/editors").then(r => r.json());
    const sel = document.getElementById("cef-editor-select");
    if (sel) sel.innerHTML = allEditors.map(e => `<option value="${e.id}">${e.name} (${e.email})</option>`).join("");
    document.getElementById("cef-new-name").value = "";
    document.getElementById("cef-new-email").value = "";
    document.getElementById("cef-new-image").value = "";

  function ccOnLoopChange() {
    const idx = parseInt(document.getElementById("cc-loop")?.value || "0", 10);
    const loop = ccLoops[idx];
    const editors = loop?.editors || [];
    const sel = document.getElementById("cc-editor");
    if (sel) sel.innerHTML = editors.map((e, i) => `<option value="${i}">${e.name} (${e.email})</option>`).join("");
    // Visa/dölj segment-väljare
    const segWrap = document.getElementById("cc-segment-wrap");
    if (segWrap) segWrap.style.display = loop?.segment_gratis_id ? "flex" : "none";
  }

  function ccInsertBold() {
    const ta = document.getElementById("cc-intro");
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const val = ta.value;
    const selected = val.slice(start, end) || "fetstil";
    const insert = `**${selected}**`;
    ta.value = val.slice(0, start) + insert + val.slice(end);
    ta.focus();
    ta.setSelectionRange(start + 2, start + 2 + selected.length);
  }

  function ccInsertLink() {
    const ta = document.getElementById("cc-intro");
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const val = ta.value;
    const selected = val.slice(start, end);
    const url = prompt("Klistra in URL:");
    if (!url) return;
    const insert = `[${selected || "länktext"}](${url})`;
    ta.value = val.slice(0, start) + insert + val.slice(end);
    ta.focus();
    ta.setSelectionRange(start, start + insert.length);
  }

  async function ccSubmit() {
    const idx      = parseInt(document.getElementById("cc-loop")?.value || "0", 10);
    const loop     = ccLoops[idx];
    const subject  = document.getElementById("cc-subject").value.trim();
    const preheader= document.getElementById("cc-preheader").value.trim();
    const intro    = document.getElementById("cc-intro").value.trim();
    const editorIdx= parseInt(document.getElementById("cc-editor").value || "0", 10);
    const editor   = loop?.editors?.[editorIdx];
    const segment  = document.getElementById("cc-segment")?.value || "alla";
    const btn      = document.getElementById("cc-btn");
    const result   = document.getElementById("cc-result");

    if (!subject || !intro) {
      result.style.display = "block";
      result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#fff0f0;border:1px solid #fca5a5;font-size:13px;color:#dc2626">Fyll i ämnesrad och introtext.</div>`;
      return;
    }

    btn.textContent = "Skapar utkast…";
    btn.disabled = true;
    result.style.display = "none";

    try {
      const res = await fetch("/api/campaign-mailchimp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          subject,
          previewText: preheader,
          intro,
          segment,
          loop: { name: loop.name, color: loop.color, logo_url: loop.logo_url, website_url: loop.website_url, from_name: loop.from_name, reply_to: loop.reply_to, mailchimp_list_id: loop.mailchimp_list_id, segment_gratis_id: loop.segment_gratis_id, segment_betalande_id: loop.segment_betalande_id },
          editorName: editor?.name || "",
          editorEmail: editor?.email || "",
          editorImageUrl: editor?.image_url || "",
        }),
      });
      const data = await res.json();
      result.style.display = "block";
      if (data.editUrl) {
        result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#f0fff4;border:1px solid #86efac;font-size:13px;color:#16a34a">
          ✅ Utkastet är skapat! <a href="${data.editUrl}" target="_blank" rel="noreferrer" style="color:#2563eb;text-decoration:underline;margin-left:8px">Öppna i Mailchimp →</a>
        </div>`;
      } else {
        result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#fff0f0;border:1px solid #fca5a5;font-size:13px;color:#dc2626">❌ ${data.error || "Något gick fel"}</div>`;
      }
    } catch(e) {
      result.style.display = "block";
      result.innerHTML = `<div style="padding:12px 16px;border-radius:8px;background:#fff0f0;border:1px solid #fca5a5;font-size:13px;color:#dc2626">❌ Något gick fel – försök igen.</div>`;
    } finally {
      btn.textContent = "✓ Skapa Mailchimp-utkast";
      btn.disabled = false;
    }
  }

  // ── Editors ──────────────────────────────────────────────────────────────
  async function renderEditorsPage() {
    const el = document.getElementById("main-content");
    el.innerHTML = `<div style="font-size:13px;color:var(--muted);padding:24px 0">Laddar redaktörer…</div>`;

    const [editors, loops] = await Promise.all([
      fetch("/api/editors").then(r => r.json()),
      fetch("/api/loops").then(r => r.json()),
    ]);

    function editorCard(e) {
      const linkedLoops = loops.filter(l => (l.editors || []).some(le => le.id === e.id));
      const loopBadges = linkedLoops.map(l =>
        `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${l.color};color:#111;margin-right:4px">${l.name}</span>`
      ).join("") || `<span style="font-size:11px;color:var(--muted)">Ingen loop</span>`;

      return `
        <div id="editor-card-${e.id}" style="display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--sidebar-bg)">
          ${e.image_url ? `<img src="${e.image_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">` : `<div style="width:36px;height:36px;border-radius:50%;background:var(--border);flex-shrink:0"></div>`}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${e.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${e.email}</div>
            <div>${loopBadges}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button onclick="edShowEdit('${e.id}')"
              style="font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;font-family:inherit">Redigera</button>
            <button onclick="edDelete('${e.id}')"
              style="font-size:11px;padding:3px 10px;border:1px solid #fca5a5;border-radius:5px;background:#fff0f0;cursor:pointer;color:#dc2626;font-family:inherit">Radera</button>
          </div>
        </div>`;
    }

    el.innerHTML = `
      <div style="padding:24px 0 8px;max-width:680px">
        <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px">Editors</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Hantera redaktörer och koppla dem till loopar.</div>

        <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
          <button onclick="edShowNew()"
            style="padding:7px 18px;background:#e4ffc2;border:1px solid #bef08b;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
            + Ny redaktör
          </button>
        </div>

        <div id="ed-form" style="display:none;margin-bottom:16px"></div>
        <div id="ed-list">${editors.map(e => editorCard(e)).join("") || '<div style="font-size:13px;color:var(--muted)">Inga redaktörer ännu.</div>'}</div>
      </div>`;

    // Spara lokalt för edit-åtgärder
    window._edEditors = editors;
    window._edLoops   = loops;
  }

  function edForm(e = null) {
    const loops = window._edLoops || [];
    const linkedIds = new Set(loops.filter(l => (l.editors||[]).some(le => le.id === e?.id)).map(l => l.id));
    return `
      <div style="border:1px solid var(--border);border-radius:8px;padding:16px;background:#fff;margin-bottom:4px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px">${e ? "Redigera redaktör" : "Ny redaktör"}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:11px;color:var(--muted)">Namn</label>
            <input id="ed-name" value="${e?.name || ""}" placeholder="Förnamn Efternamn"
              style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:11px;color:var(--muted)">E-post</label>
            <input id="ed-email" value="${e?.email || ""}" placeholder="namn@loop.se"
              style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:14px">
          <label style="font-size:11px;color:var(--muted)">Bild URL</label>
          <input id="ed-image" value="${e?.image_url || ""}" placeholder="https://..."
            style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;width:100%;box-sizing:border-box">
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
          <label style="font-size:11px;color:var(--muted)">Koppla till loopar</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${loops.map(l => `
              <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:6px;background:${l.color}22;border:1px solid ${l.color}">
                <input type="checkbox" data-loop-id="${l.id}" ${linkedIds.has(l.id) ? "checked" : ""}
                  style="cursor:pointer"> ${l.name}
              </label>`).join("")}
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="${e ? `edSave('${e.id}')` : "edCreate()"}"
            style="padding:7px 18px;background:#e4ffc2;border:1px solid #bef08b;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
            ${e ? "Spara" : "Skapa"}
          </button>
          <button onclick="edCloseForm()"
            style="padding:7px 18px;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit">
            Avbryt
          </button>
        </div>
      </div>`;
  }

  function edShowNew() {
    document.getElementById("ed-form").style.display = "block";
    document.getElementById("ed-form").innerHTML = edForm();
  }

  function edShowEdit(id) {
    const e = (window._edEditors || []).find(x => x.id === id);
    document.getElementById("ed-form").style.display = "block";
    document.getElementById("ed-form").innerHTML = edForm(e);
  }

  function edCloseForm() {
    document.getElementById("ed-form").style.display = "none";
  }

  async function edCreate() {
    const body = {
      name:      document.getElementById("ed-name").value.trim(),
      email:     document.getElementById("ed-email").value.trim(),
      image_url: document.getElementById("ed-image").value.trim(),
    };
    if (!body.name) return alert("Namn krävs");
    const newEditor = await fetch("/api/editors", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    }).then(r => r.json());
    // Koppla till valda loopar
    const checks = document.querySelectorAll("[data-loop-id]");
    for (const cb of checks) {
      if (cb.checked) {
        await fetch("/api/editors?action=link", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ loop_id: cb.dataset.loopId, editor_id: newEditor.id }),
        });
      }
    }
    ccLoops = []; // Rensa loop-cache
    renderEditorsPage();
  }

  async function edSave(id) {
    const body = {
      name:      document.getElementById("ed-name").value.trim(),
      email:     document.getElementById("ed-email").value.trim(),
      image_url: document.getElementById("ed-image").value.trim(),
    };
    await fetch(`/api/editors?id=${id}`, {
      method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
    // Uppdatera loop-kopplingar
    const loops = window._edLoops || [];
    const currentLinked = loops.filter(l => (l.editors||[]).some(e => e.id === id));
    const currentIds = new Set(currentLinked.map(l => l.id));
    const checks = document.querySelectorAll("[data-loop-id]");
    for (const cb of checks) {
      const loopId = cb.dataset.loopId;
      const wasLinked = currentIds.has(loopId);
      if (cb.checked && !wasLinked) {
        await fetch("/api/editors?action=link", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ loop_id: loopId, editor_id: id }),
        });
      } else if (!cb.checked && wasLinked) {
        const loop = loops.find(l => l.id === loopId);
        const linkId = loop?.editors?.find(e => e.id === id)?.link_id;
        if (linkId) await fetch(`/api/editors?action=unlink&id=${linkId}`, { method: "DELETE" });
      }
    }
    ccLoops = [];
    renderEditorsPage();
  }

  async function edDelete(id) {
    if (!confirm("Radera redaktören helt? Kopplingarna till loopar tas också bort.")) return;
    await fetch(`/api/editors?id=${id}`, { method: "DELETE" });
    ccLoops = [];
    renderEditorsPage();
  }

  // Boot
  renderOverviewPage();
</script>
</body>
</html>
